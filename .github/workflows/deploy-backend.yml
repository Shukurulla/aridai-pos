name: Deploy backend (VPS)

# global/backend o'zgarsa (main'ga push) → VPS'da git pull + npm + pm2 restart.
# Kerakli secretlar (Settings → Secrets → Actions):
#   VPS_HOST = 37.60.226.97
#   VPS_USER = root
#   VPS_SSH_KEY = SSH private key (deploy uchun — parol emas, kalit qo'shing)
#   VPS_PATH = /root/shukurulla/aridai-pos
# Deploy qilingan: backend pm2 nomi "aridai-pos-backend", port 4560 (izolyatsiya).
on:
  push:
    branches: [main]
    paths:
      - "global/backend/**"
  workflow_dispatch: {}

# Backend va web deploy BIR XIL VPS papkasida ishlaydi — bir vaqtda `git pull`
# qilishsa race bo'ladi. Shared concurrency group bilan ketma-ket bajariladi.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH → pull + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            git pull origin main
            cd global/backend
            npm ci --omit=dev
            pm2 restart aridai-pos-backend || pm2 start index.js --name aridai-pos-backend
            pm2 save
